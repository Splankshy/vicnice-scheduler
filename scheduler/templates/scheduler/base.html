<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vic_nice Home Concepts</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Segoe UI",sans-serif;background:#f0f0f8;color:#1a1a2e;}
.sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;background:#3730a3;color:white;padding:20px 0;overflow-y:auto;z-index:1000;transition:transform 0.3s;}
.sidebar .logo{padding:20px 24px 30px;font-size:18px;font-weight:700;border-bottom:1px solid #4f46e5;line-height:1.3;}
.sidebar .logo span{display:block;font-size:12px;font-weight:400;opacity:0.7;margin-top:4px;}
.sidebar a{display:block;padding:12px 24px;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;transition:all 0.2s;}
.sidebar a:hover{background:#4f46e5;color:white;padding-left:30px;}
.main{margin-left:220px;padding:30px;}
.topbar{background:white;border-radius:12px;padding:16px 24px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.topbar h1{font-size:20px;color:#3730a3;font-weight:700;}
.topbar .date{font-size:13px;color:#6b7280;}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;}
.hamburger span{display:block;width:24px;height:3px;background:#3730a3;margin:5px 0;border-radius:3px;transition:0.3s;}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;}
.card{background:white;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:20px;}
.card h2{font-size:16px;font-weight:600;color:#3730a3;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #e5e7eb;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat{background:white;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);border-left:4px solid #3730a3;}
.stat .num{font-size:32px;font-weight:700;color:#3730a3;}
.stat .label{font-size:13px;color:#6b7280;margin-top:4px;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:500px;}
th{text-align:left;padding:10px 12px;font-size:12px;color:#6b7280;border-bottom:2px solid #e5e7eb;text-transform:uppercase;letter-spacing:0.05em;}
td{padding:12px;font-size:14px;border-bottom:1px solid #f3f4f6;}
tr:hover td{background:#f8f7ff;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;}
.badge-consultation{background:#e0e7ff;color:#3730a3;}
.badge-fitting{background:#fce7f3;color:#9d174d;}
.badge-sewing{background:#d1fae5;color:#065f46;}
.badge-class{background:#fef3c7;color:#92400e;}
.badge-delivery{background:#dbeafe;color:#1e40af;}
.badge-other{background:#f3f4f6;color:#374151;}
.badge-upcoming{background:#e0e7ff;color:#3730a3;}
.badge-completed{background:#d1fae5;color:#065f46;}
.badge-cancelled{background:#fee2e2;color:#991b1b;}
.badge-beginner{background:#fef3c7;color:#92400e;}
.badge-intermediate{background:#dbeafe;color:#1e40af;}
.badge-advanced{background:#d1fae5;color:#065f46;}
.btn{display:inline-block;padding:8px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;text-decoration:none;transition:all 0.2s;}
.btn-primary{background:#3730a3;color:white;}
.btn-primary:hover{background:#4f46e5;}
.empty{text-align:center;padding:40px;color:#9ca3af;font-size:14px;}
input[type=text],input[type=email],input[type=date],input[type=time],input[type=number],select,textarea{width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;color:#1a1a2e;background:#f9fafb;outline:none;transition:border 0.2s;font-family:"Segoe UI",sans-serif;}
input:focus,select:focus,textarea:focus{border-color:#3730a3;background:white;box-shadow:0 0 0 3px rgba(55,48,163,0.1);}
.search-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.search-bar input{max-width:320px;}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);}
.sidebar.open{transform:translateX(0);}
.overlay.open{display:block;}
.main{margin-left:0;padding:16px;}
.hamburger{display:block;}
.stats{grid-template-columns:repeat(2,1fr);}
.topbar{padding:12px 16px;}
.topbar h1{font-size:16px;}
.card{padding:16px;}
}
@media(max-width:400px){
.stats{grid-template-columns:1fr 1fr;gap:10px;}
.stat .num{font-size:24px;}
}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="logo">Vic_nice<span>Home Concepts</span></div>
  <a href="/" onclick="closeSidebar()">Dashboard</a>
  <a href="/appointments/" onclick="closeSidebar()">Appointments</a>
  <a href="/clients/" onclick="closeSidebar()">Clients</a>
  <a href="/students/" onclick="closeSidebar()">Students</a>
  <a href="/calendar/" onclick="closeSidebar()">Calendar</a>
  <a href="/admin/" onclick="closeSidebar()">Admin</a>
</div>
<div class="main">
  <div class="topbar">
    <button class="hamburger" onclick="openSidebar()">
      <span></span><span></span><span></span>
    </button>
    <h1>{% block title %}Vic_nice Home Concepts{% endblock %}</h1>
    <span class="date">{% now "N j, Y" %}</span>
  </div>
  {% block content %}{% endblock %}
</div>
<script>
function openSidebar(){document.getElementById("sidebar").classList.add("open");document.getElementById("overlay").classList.add("open");}
function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("overlay").classList.remove("open");}
</script>
</body>
</html>
