<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vic_nice Home Concepts</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Inter",sans-serif;background:#f8f5ff;min-height:100vh;color:#2d2145;}
.sidebar{position:fixed;top:0;left:0;width:230px;height:100vh;background:white;border-right:1px solid #ede9fe;color:#2d2145;overflow-y:auto;z-index:1000;transition:transform 0.3s ease;box-shadow:2px 0 12px rgba(124,58,237,0.06);}
.sidebar .logo{padding:24px 20px;border-bottom:1px solid #ede9fe;}
.sidebar .logo h2{font-size:18px;font-weight:700;color:#7c3aed;}
.sidebar .logo span{display:block;font-size:11px;font-weight:500;color:#a78bfa;margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;}
.nav-section{padding:12px 0;}
.nav-label{padding:10px 20px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#c4b5fd;}
.sidebar a{display:block;padding:10px 20px;color:#6d28d9;text-decoration:none;font-size:14px;font-weight:500;transition:all 0.15s;border-radius:0;margin:1px 8px;border-radius:8px;}
.sidebar a:hover{background:#f5f3ff;color:#7c3aed;}
.sidebar .logout-link{position:absolute;bottom:0;width:100%;border-top:1px solid #ede9fe;padding:8px;}
.sidebar .logout-link a{color:#ef4444;margin:0;}
.sidebar .logout-link a:hover{background:#fee2e2;color:#dc2626;}
.main{margin-left:230px;padding:28px;min-height:100vh;}
.topbar{background:white;border-radius:14px;padding:16px 24px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 12px rgba(124,58,237,0.06);border:1px solid #ede9fe;}
.topbar h1{font-size:20px;color:#7c3aed;font-weight:600;}
.topbar .date{font-size:13px;color:#8b5cf6;background:#f5f3ff;padding:5px 12px;border-radius:20px;font-weight:500;}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;}
.hamburger span{display:block;width:22px;height:2px;background:#7c3aed;margin:5px 0;border-radius:2px;}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:999;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat{background:white;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(124,58,237,0.06);border:1px solid #ede9fe;transition:transform 0.2s;}
.stat:hover{transform:translateY(-2px);}
.stat .num{font-size:34px;font-weight:700;color:#7c3aed;}
.stat .label{font-size:13px;color:#a78bfa;margin-top:4px;font-weight:500;}
.card{background:white;border-radius:14px;padding:24px;box-shadow:0 2px 12px rgba(124,58,237,0.06);margin-bottom:20px;border:1px solid #ede9fe;}
.card h2{font-size:16px;font-weight:600;color:#7c3aed;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid #f5f3ff;display:flex;align-items:center;justify-content:space-between;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:10px 14px;font-size:11px;color:#a78bfa;border-bottom:1px solid #f5f3ff;text-transform:uppercase;letter-spacing:0.06em;font-weight:600;}
td{padding:12px 14px;font-size:14px;border-bottom:1px solid #faf5ff;}
tr:hover td{background:#faf5ff;}
.table-wrap{overflow-x:auto;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;}
.badge-consultation{background:#ede9fe;color:#6d28d9;}
.badge-fitting{background:#fce7f3;color:#9d174d;}
.badge-sewing{background:#d1fae5;color:#065f46;}
.badge-class{background:#fef3c7;color:#92400e;}
.badge-delivery{background:#dbeafe;color:#1e40af;}
.badge-other{background:#f3f4f6;color:#374151;}
.badge-upcoming{background:#ede9fe;color:#6d28d9;}
.badge-completed{background:#d1fae5;color:#065f46;}
.badge-cancelled{background:#fee2e2;color:#991b1b;}
.badge-beginner{background:#fef3c7;color:#92400e;}
.badge-intermediate{background:#dbeafe;color:#1e40af;}
.badge-advanced{background:#d1fae5;color:#065f46;}
.btn{display:inline-flex;align-items:center;padding:8px 18px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;border:none;text-decoration:none;transition:all 0.15s;}
.btn-primary{background:#7c3aed;color:white;}
.btn-primary:hover{background:#6d28d9;}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:7px;}
.btn-danger{background:#fee2e2;color:#991b1b;}
.btn-danger:hover{background:#fecaca;}
.btn-success{background:#d1fae5;color:#065f46;}
.btn-success:hover{background:#a7f3d0;}
.empty{text-align:center;padding:48px;color:#c4b5fd;font-size:14px;}
input[type=text],input[type=email],input[type=date],input[type=time],input[type=number],select,textarea{width:100%;padding:9px 13px;border:1px solid #ede9fe;border-radius:9px;font-size:14px;color:#2d2145;background:#faf5ff;outline:none;transition:all 0.15s;font-family:"Inter",sans-serif;}
input:focus,select:focus,textarea:focus{border-color:#7c3aed;background:white;box-shadow:0 0 0 3px rgba(124,58,237,0.08);}
.search-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.search-bar input{max-width:300px;}
.alert-success{padding:12px 16px;background:#d1fae5;color:#065f46;border-radius:9px;margin-bottom:16px;font-size:14px;border-left:3px solid #10b981;}
.alert-error{padding:12px 16px;background:#fee2e2;color:#991b1b;border-radius:9px;margin-bottom:16px;font-size:14px;border-left:3px solid #ef4444;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.card{animation:fadeIn 0.25s ease forwards;}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);}
.sidebar.open{transform:translateX(0);}
.overlay.open{display:block;}
.main{margin-left:0;padding:16px;}
.hamburger{display:block;}
.stats{grid-template-columns:repeat(2,1fr);gap:12px;}
.topbar{padding:12px 16px;}
.card{padding:18px;}
}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="logo">
    <h2>Vic_nice</h2>
    <span>Home Concepts</span>
  </div>
  <div class="nav-section">
    <div class="nav-label">Main Menu</div>
    <a href="/" onclick="closeSidebar()">Dashboard</a>
    <a href="/appointments/" onclick="closeSidebar()">Appointments</a>
    <a href="/clients/" onclick="closeSidebar()">Clients</a>
    <a href="/students/" onclick="closeSidebar()">Students</a>
    <a href="/calendar/" onclick="closeSidebar()">Calendar</a>
  </div>
  <div class="nav-section">
    <div class="nav-label">System</div>
    <a href="/admin/" onclick="closeSidebar()">Admin Panel</a>
  </div>
  <div class="logout-link">
    <a href="/logout/" onclick="closeSidebar()">Logout</a>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px;">
      <button class="hamburger" onclick="openSidebar()"><span></span><span></span><span></span></button>
      <h1>{% block title %}Vic_nice Home Concepts{% endblock %}</h1>
    </div>
    <span class="date">{% now "N j, Y" %}</span>
  </div>
  {% block content %}{% endblock %}
</div>
<script>
function openSidebar(){document.getElementById("sidebar").classList.add("open");document.getElementById("overlay").classList.add("open");}
function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("overlay").classList.remove("open");}
</script>
</body>
</html>
