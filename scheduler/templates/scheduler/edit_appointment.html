{% extends "scheduler/base.html" %}
{% block title %}Edit Appointment{% endblock %}
{% block content %}
<div class="card">
  <h2>Edit: {{ appointment.title }}</h2>
  <form method="post" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
    {% csrf_token %}
    {% for field in form %}
    <div style="display:flex;flex-direction:column;gap:4px;">
      <label style="font-size:13px;color:#6b7280;font-weight:500;">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<span style="color:red;font-size:12px;">{{ field.errors }}</span>{% endif %}
    </div>
    {% endfor %}
    <div style="grid-column:1/-1;">
      <button type="submit" class="btn btn-primary">Update Appointment</button>
      <a href="/appointments/" style="margin-left:12px;color:#6b7280;font-size:14px;">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
