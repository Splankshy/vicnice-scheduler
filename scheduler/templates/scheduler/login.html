<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vic_nice Home Concepts - Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Segoe UI",sans-serif;background:#3730a3;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-box{background:white;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.logo{text-align:center;margin-bottom:32px;}
.logo h1{font-size:24px;font-weight:700;color:#3730a3;}
.logo p{font-size:14px;color:#6b7280;margin-top:4px;}
.field{margin-bottom:20px;}
.field label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px;}
input[type=text],input[type=password]{width:100%;padding:10px 14px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;transition:border 0.2s;}
input:focus{border-color:#3730a3;box-shadow:0 0 0 3px rgba(55,48,163,0.1);}
.btn{width:100%;padding:12px;background:#3730a3;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s;}
.btn:hover{background:#4f46e5;}
.error{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <h1>Vic_nice Home Concepts</h1>
    <p>Staff Login</p>
  </div>
  {% if messages %}
  {% for message in messages %}
  <div class="error">{{ message }}</div>
  {% endfor %}
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" required autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn">Log In</button>
  </form>
</div>
</body>
</html>
