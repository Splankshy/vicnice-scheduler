{% extends "scheduler/base.html" %}
{% block title %}Setup{% endblock %}
{% block content %}
<div class="card">
  <h2>Create Admin Account</h2>
  {% if messages %}
  {% for message in messages %}
  <div style="padding:12px;background:#d1fae5;color:#065f46;border-radius:8px;margin-bottom:16px;">{{ message }}</div>
  {% endfor %}
  {% endif %}
  <form method="post" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
    {% csrf_token %}
    <div style="display:flex;flex-direction:column;gap:4px;">
      <label style="font-size:13px;color:#6b7280;font-weight:500;">Username</label>
      <input type="text" name="username" required>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;">
      <label style="font-size:13px;color:#6b7280;font-weight:500;">Email</label>
      <input type="email" name="email">
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;">
      <label style="font-size:13px;color:#6b7280;font-weight:500;">Password</label>
      <input type="password" name="password" required>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;">
      <label style="font-size:13px;color:#6b7280;font-weight:500;">Setup Key</label>
      <input type="password" name="key" placeholder="Enter setup key" required>
    </div>
    <div style="grid-column:1/-1;">
      <button type="submit" class="btn btn-primary">Create Admin</button>
    </div>
  </form>
</div>
{% endblock %}
